<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام سِدان</title>
    <!-- خط عربي من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/index.css">

</head>
<body>

    <!-- Background Elements -->
    <div class="ambient-shape shape-1"></div>
    <div class="ambient-shape shape-2"></div>
    <div class="ambient-shape shape-3"></div>

    <div class="login-card">
        <div class="brand-header">
            <div class="brand-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" />
                </svg>
            </div>
            <h1>تسجيل الدخول</h1>
            <p class="subtitle">نظام سِدان - الإدارة الذكية لبلاغات الحشود</p>
        </div>

        <form id="authForm">
            <div class="form-group">
                <label class="form-label" for="username">اسم المستخدم</label>
                <input type="text" id="username" class="form-control" placeholder="أدخل اسم المستخدم..." autocomplete="username" value="admin" required>
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">كلمة المرور</label>
                <input type="password" id="password" class="form-control" placeholder="أدخل كلمة المرور..." autocomplete="current-password" value="admin123" required>
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" checked>
                    تذكرني
                </label>
                <a href="#" class="forgot-pass" onclick="alert('هذه الواجهة تجريبية، يرجى الضغط على دخول مباشرة')">هل نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span id="btnText">دخول للنظام</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>

        <div class="mock-info">
            بيانات تجريبية مساعدة (Mock Data) <br>
            حساب: <span>admin</span> | مرور: <span>admin123</span>
        </div>
    </div>

    <script src="assets/js/index.js"></script>

</body>
</html>
